<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="./vite.svg" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Vite + React</title>
  <style>
    body {
      margin: 0;
      background-color: var(--bg-main, #F8F2F6);
    }

    #root {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: var(--bg-main, #F8F2F6);
    }

    .initial-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid var(--accent-color, #7B9FE0);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }
  </style>
  <script>
    (function () {
      try {
        var url = new URL(window.location.href);
        [
          'cp_custom_css',
          'cp_theme_config',
          'cp_theme'
        ].forEach(function (key) {
          localStorage.removeItem(key);
        });

        if (url.searchParams.get('resetLocalState') === '1') {
          [
            'cp_avatar',
            'pixelWorld.commercialStreetV2.layout'
          ].forEach(function (key) {
            localStorage.removeItem(key);
          });
          url.searchParams.delete('resetLocalState');
          window.history.replaceState({}, '', url.pathname + url.search + url.hash);
        }
      } catch (e) { }
    })();
  </script>
  <script type="module" crossorigin src="./assets/index-9wrMyh00.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-Ch_IcbGr.css">
</head>

<body>
  <div id="root">
    <div class="initial-spinner"></div>
  </div>
</body>

</html>
